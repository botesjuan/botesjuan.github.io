---
layout: default
---
<article class="post-body">
  <div class="post-header">
    <div class="post-meta-top">{{ page.date | date: "%Y-%m-%d" }} · {{ page.categories | join: " · " }}</div>
    <h1>{{ page.title }}</h1>
    <div class="tags-row">{% for tag in page.tags %}<span class="tag">{{ page.tag }}</span>{% endfor %}</div>
  </div>
  <div class="post-content">{{ content }}</div>
</article>
